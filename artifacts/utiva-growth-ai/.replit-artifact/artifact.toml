kind = "web"
previewPath = "/"
title = "Utiva Growth AI Dashboard"
version = "1.0.0"
id = "artifacts/utiva-growth-ai"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19979

[services.development]
run = "pnpm --filter @workspace/utiva-growth-ai run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/utiva-growth-ai", "run", "build" ]
publicDir = "artifacts/utiva-growth-ai/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19979"
BASE_PATH = "/"
